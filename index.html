<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Custom Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="script.js" defer></script>
</head>
<body>

<div class="valorant-timer">
  <div class="timer-header">
    <span class="timer-title">Tiempo Restante</span>
  </div>

  <div class="timer-display" id="timer-display">00:00:00</div>

  <div class="timer-footer" id="timer-controls">
    <div class="inputs-group">
      <label>H: <input type="number" id="input-hours" min="0" value="0"></label>
      <label>M: <input type="number" id="input-minutes" min="0" value="0"></label>
      <label>S: <input type="number" id="input-seconds" min="0" value="0"></label>
    </div>
    <button id="start-timer">Iniciar para todos</button>
  </div>
</div>

</body>
</html>
