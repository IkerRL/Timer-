<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Twitch Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="valorant-timer">
    <div class="timer-header">
      <span class="timer-title">Tiempo Restante</span>
    </div>

    <div class="timer-display" id="timer-display">00:15</div>

    <div class="timer-footer" id="timer-controls">
      <span class="timer-subtext">Esperando comando !voto...</span>
    </div>
  </div>

</body>
</html>
